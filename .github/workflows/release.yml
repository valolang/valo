name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: valo-linux-x64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: valo-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir dist

          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/valo.exe dist/valo.exe
            cd dist
            powershell Compress-Archive valo.exe ${{ matrix.artifact }}.zip
          else
            cp target/${{ matrix.target }}/release/valo dist/valo
            cd dist
            tar -czf ${{ matrix.artifact }}.tar.gz valo
          fi

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
